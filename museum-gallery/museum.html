<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Viewer</title>
    <link rel="stylesheet" href="museum.css" />
  </head>

  <body>
    <h1>Museum gallery</h1>
    <main>
      <div class="gallery">
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="ancient stones and map img"/>
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="nature wind image" />
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="nature trees image" />
      </div>
      <div class="lightbox">
        <button id="close-btn">&times;</button>
        <img id="lightbox-img" src="" alt="Full Image"/>
      </div>
    </main>
    <script src="museum.js"></script>
  </body>

</html>

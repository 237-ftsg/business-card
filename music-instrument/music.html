<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Instrument Product Page</title>
    <link rel="stylesheet" href="music.css">
</head>
<body>
    <h1>Student Instruments</h1>
    <main>
        <select name="select-container" class="select-container">
            <option value="all" id="all">All</option>
            <option value="woodwinds" id="woodwinds">Woodwinds</option>
            <option value="brass" id="brass">Brass</option>
            <option value="percussion" id="percussion">Percussion</option>
        </select>

        <div class="products-container">
            <div class="card">
                <h2>Flute</h2>
                <p>$500</p>
            </div>
            <div class="card">
                <h2>Clarinet</h2>
                <p>$200</p>
            </div>
            <div class="card">
                <h2>Oboe</h2>
                <p>$4000</p>
            </div>
            <div class="card">
                <h2>Trumpet</h2>
                <p>$200</p>
            </div>
            <div class="card">
                <h2>French Horn</h2>
                <p>$4300</p>
            </div>
            <div class="card">
                <h2>Drum Set</h2>
                <p>$500</p>
            </div>
            <div class="card">
                <h2>Xylophone</h2>
                <p>$200</p>
            </div>
            <div class="card">
                <h2>Trumpet</h2>
                <p>$3000</p>
            </div>
            <div class="card">
                <h2>Cymbals</h2>
                <p>$200</p>
            </div>
            <div class="card">
                <h2>Marimba</h2>
                <p>$3000</p>
            </div>
        </div>
    </main>
    <script src="music.js"></script>
</body>
</html>

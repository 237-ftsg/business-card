<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="theme.css">
</head>
<body>
    <button id="theme-switcher-button" aria-haspopup="menu" aria-expanded="false" aria-controls="theme-dropdown">Switch Theme</button>
    <ul id="theme-dropdown" role="menu" aria-labelledby="theme-switcher-button" hidden>
        <li role="menuitem" id="theme-black">black</li>
        <li role="menuitem" id="theme-orange">orange</li>
        <li role="menuitem" id="theme-red">red</li>
        <li role="menuitem" id="theme-green">green</li>
        <li role="menuitem" id="theme-blue">blue</li>
    </ul>
    <p id="status-message" aria-live="polite"></p>
    <script src="theme.js"></script>
</body>
</html>
